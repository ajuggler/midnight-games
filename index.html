<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compass Grid</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="copy">
          <p class="eyebrow">Wolfram Recreation</p>
          <h1>Compass Grid</h1>
          <p class="description">
            Click any square to rotate its arrow through the four compass
            directions.
          </p>
        </div>
        <canvas
          id="compass-canvas"
          width="500"
          height="500"
          aria-label="Grid of squares with directional arrows"
        ></canvas>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
